<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя, Соня</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #ffd1dc, #ffb6c1, #ffc6d9);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #8a2d56;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        /* Стили прелоадера */
        .preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffd1dc, #ffb6c1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 1.5s ease, visibility 1.5s ease;
        }

        .heart-container {
            position: relative;
            width: 150px;
            height: 150px;
            cursor: pointer;
        }

        .heart {
            width: 100px;
            height: 100px;
            background-color: #ff4d6d;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.7);
            transition: all 0.5s ease;
            animation: heartbeat 1.8s infinite;
        }

        .heart:hover {
            transform: translate(-50%, -50%) rotate(45deg) scale(1.2);
            box-shadow: 0 0 40px rgba(255, 77, 109, 0.9);
        }

        .heart:before,
        .heart:after {
            content: '';
            width: 100px;
            height: 100px;
            background-color: #ff4d6d;
            border-radius: 50%;
            position: absolute;
        }

        .heart:before {
            top: -50px;
            left: 0;
        }

        .heart:after {
            top: 0;
            left: -50px;
        }

        .instruction {
            margin-top: 30px;
            font-size: 1.2rem;
            color: #a64d79;
            opacity: 0.8;
            animation: pulse 2s infinite;
        }

        .message-container {
            display: none;
            opacity: 0;
            transition: opacity 1.5s ease;
            position: relative;
            width: 100%;
            min-height: 80vh;
        }

        .message-block {
            position: absolute;
            padding: 25px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            opacity: 0;
            transform: scale(0.8);
        }

        .message-block h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: #ff4d6d;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .message-block p {
            font-size: 1.3rem;
            color: #8a2d56;
            line-height: 1.6;
        }

        .block-1 {
            top: 10%;
            left: 5%;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(255, 77, 109, 0.3);
        }

        .block-2 {
            top: 15%;
            right: 5%;
            background: rgba(255, 240, 245, 0.5);
            border: 2px solid rgba(255, 105, 180, 0.3);
        }

        .block-3 {
            top: 50%;
            left: 10%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.35);
            border: 2px solid rgba(255, 20, 147, 0.3);
        }

        .block-4 {
            bottom: 15%;
            right: 10%;
            background: rgba(255, 240, 245, 0.45);
            border: 2px solid rgba(219, 112, 147, 0.3);
        }

        .block-5 {
            bottom: 10%;
            left: 20%;
            background: rgba(255, 255, 255, 0.4);
            border: 2px solid rgba(199, 21, 133, 0.3);
        }

        .signature {
            position: absolute;
            bottom: 5%;
            right: 5%;
            font-family: 'Dancing Script', cursive;
            font-size: 2.2rem;
            color: #ff4d6d;
            opacity: 0;
            transform: translateX(50px);
        }

        .hearts-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .floating-heart {
            position: absolute;
            font-size: 24px;
            color: rgba(255, 77, 109, 0.4);
            animation: float 8s infinite ease-in-out;
        }

        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
        }

        .fade-out {
            opacity: 0;
            visibility: hidden;
        }

        .show {
            display: block;
            opacity: 1;
        }

        /* Анимации для блоков */
        @keyframes slideInLeft {
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes slideInRight {
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes slideInDown {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes zoomIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes heartbeat {
            0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
            25% { transform: translate(-50%, -50%) rotate(45deg) scale(1.1); }
            50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.05); }
            75% { transform: translate(-50%, -50%) rotate(45deg) scale(1.15); }
            100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(1) rotate(180deg); opacity: 0; }
        }

        @media (max-width: 768px) {
            .message-block {
                max-width: 300px;
                padding: 20px;
            }
            
            .message-block h1 {
                font-size: 2.2rem;
            }
            
            .message-block p {
                font-size: 1.1rem;
            }
            
            .block-1, .block-2, .block-3, .block-4, .block-5 {
                position: relative;
                top: auto;
                left: auto;
                right: auto;
                bottom: auto;
                transform: none;
                margin: 20px auto;
            }
            
            .message-container {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            
            .signature {
                position: relative;
                bottom: auto;
                right: auto;
                margin-top: 30px;
            }
            
            .heart-container {
                width: 120px;
                height: 120px;
            }
            
            .heart {
                width: 80px;
                height: 80px;
            }
            
            .heart:before,
            .heart:after {
                width: 80px;
                height: 80px;
            }
            
            .heart:before {
                top: -40px;
            }
            
            .heart:after {
                left: -40px;
            }
        }
    </style>
</head>
<body>
    <div class="preloader" id="preloader">
        <div class="heart-container">
            <div class="heart" id="heart"></div>
        </div>
        <div class="instruction">Нажми на сердечко</div>
    </div>

    <div class="container">
        <div class="message-container" id="messageContainer">
            <div class="message-block block-1" id="block1">
                <h1>Соня!</h1>
                <p>Ты мне очень сильно нравишься!</p>
            </div>
            
            <div class="message-block block-2" id="block2">
                <p>Ты очень милая</p>
            </div>
            
            <div class="message-block block-3" id="block3">
                <p>У тебя красивые глазки</p>
            </div>
            
            <div class="message-block block-4" id="block4">
                <p>Ты умеешь поддерживать</p>
            </div>
            
            <div class="message-block block-5" id="block5">
                <p>Ты — самое прекрасное, что случилось со мной за последнее время.</p>
            </div>
            
            <div class="signature" id="signature">Хотя мы даже с тобой не видились... За все время общения с тобой, я вижу что очень хороший человек.</div>
        </div>
    </div>

    <div class="hearts-background" id="heartsBackground"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const preloader = document.getElementById('preloader');
            const heart = document.getElementById('heart');
            const messageContainer = document.getElementById('messageContainer');
            const heartsBackground = document.getElementById('heartsBackground');
            const blocks = [
                { element: document.getElementById('block1'), animation: 'slideInLeft', delay: 300 },
                { element: document.getElementById('block2'), animation: 'slideInRight', delay: 800 },
                { element: document.getElementById('block3'), animation: 'slideInUp', delay: 1300 },
                { element: document.getElementById('block4'), animation: 'slideInDown', delay: 1800 },
                { element: document.getElementById('block5'), animation: 'zoomIn', delay: 2300 },
                { element: document.getElementById('signature'), animation: 'slideInRight', delay: 3000 }
            ];
            
            // Начальные позиции для анимации
            function setInitialPositions() {
                document.getElementById('block1').style.transform = 'translateX(-100px) scale(0.8)';
                document.getElementById('block2').style.transform = 'translateX(100px) scale(0.8)';
                document.getElementById('block3').style.transform = 'translateY(100px) scale(0.8)';
                document.getElementById('block4').style.transform = 'translateY(-100px) scale(0.8)';
                document.getElementById('block5').style.transform = 'scale(0.5)';
                document.getElementById('signature').style.transform = 'translateX(50px)';
            }
            
            // Создаем плавающие сердечки на фоне
            function createFloatingHearts() {
                for (let i = 0; i < 20; i++) {
                    const heart = document.createElement('div');
                    heart.classList.add('floating-heart');
                    heart.innerHTML = '❤';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDelay = Math.random() * 8 + 's';
                    heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                    heartsBackground.appendChild(heart);
                }
            }
            
            // Создаем эффект искрения при клике
            function createSparkles(x, y) {
                for (let i = 0; i < 15; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.classList.add('sparkle');
                    sparkle.style.left = x + 'px';
                    sparkle.style.top = y + 'px';
                    sparkle.style.animation = `sparkle ${Math.random() * 0.5 + 0.3}s forwards`;
                    document.body.appendChild(sparkle);
                    
                    // Удаляем искорки после анимации
                    setTimeout(() => {
                        sparkle.remove();
                    }, 1000);
                }
            }
            
            // Анимируем блоки последовательно
            function animateBlocks() {
                blocks.forEach(block => {
                    setTimeout(() => {
                        block.element.style.animation = `${block.animation} 1s forwards`;
                    }, block.delay);
                });
            }
            
            setInitialPositions();
            createFloatingHearts();
            
            // Обработчик клика по сердцу
            heart.addEventListener('click', function(e) {
                // Создаем искорки в месте клика
                createSparkles(e.clientX, e.clientY);
                
                // Увеличиваем и вращаем сердце перед исчезновением
                heart.style.transform = 'translate(-50%, -50%) rotate(45deg) scale(1.5)';
                heart.style.opacity = '0';
                
                // Плавно скрываем прелоадер
                setTimeout(() => {
                    preloader.classList.add('fade-out');
                }, 800);
                
                // Показываем контейнер с сообщениями и анимируем блоки
                setTimeout(() => {
                    messageContainer.classList.add('show');
                    animateBlocks();
                }, 1500);
            });
            
            // Добавляем дополнительные эффекты при наведении на сердце
            heart.addEventListener('mouseover', function() {
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        createSparkles(
                            heart.getBoundingClientRect().left + Math.random() * 100,
                            heart.getBoundingClientRect().top + Math.random() * 100
                        );
                    }, i * 100);
                }
            });
        });
    </script>
</body>
</html>
